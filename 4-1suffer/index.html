<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>受難期旅行分析表 — 拼圖</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Microsoft JhengHei',Arial,sans-serif;padding:10px;user-select:none;-webkit-user-select:none}
h1{color:#f0c060;font-size:clamp(14px,3vw,20px);margin-bottom:8px;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,.6)}
.btn-bar{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;justify-content:center}
button{padding:9px 22px;font-size:14px;font-family:'Microsoft JhengHei',Arial,sans-serif;border:none;border-radius:8px;cursor:pointer;font-weight:bold;transition:transform .1s,box-shadow .1s;box-shadow:0 3px 8px rgba(0,0,0,.4)}
button:active{transform:translateY(2px);box-shadow:0 1px 4px rgba(0,0,0,.3)}
#btn-shuffle{background:#e07b00;color:#fff}
#btn-check{background:#1a8a3c;color:#fff}
#btn-reset{background:#555;color:#eee}
#scale-container{width:100%;max-width:944px;position:relative}
#scale-inner{width:944px;height:937px;transform-origin:top left;position:relative}
#board{width:944px;height:937px;position:absolute;top:0;left:0;overflow:hidden;background:#22224a;border-radius:8px}
.drop-hint{position:absolute;border:2px dashed rgba(255,200,50,.55);background:rgba(255,220,80,.05);border-radius:3px;pointer-events:none;transition:background .2s,border-color .2s;display:flex;align-items:center;justify-content:center}
.drop-hint.correct{border-color:rgba(0,220,0,.8);background:rgba(0,220,0,.1)}
.hint-tag{font-size:9px;font-weight:bold;color:rgba(255,220,80,.45);font-family:'Microsoft JhengHei',Arial,sans-serif;letter-spacing:1px;text-align:center;pointer-events:none;line-height:1.4;padding:2px 4px}
.drop-hint.correct .hint-tag{color:rgba(0,220,0,.35)}
.piece{position:absolute;cursor:grab;border-radius:3px;box-shadow:2px 3px 8px rgba(0,0,0,.5);touch-action:none;z-index:1}
.piece.dragging{cursor:grabbing;box-shadow:4px 8px 18px rgba(0,0,0,.7);z-index:1000}
.piece.locked{cursor:default;box-shadow:0 0 0 2px rgba(60,220,80,.8),1px 2px 6px rgba(0,0,0,.4)}
.piece img{display:block;width:100%;height:100%;border-radius:3px;pointer-events:none}
#divider{position:absolute;left:392px;top:8px;width:2px;height:921px;background:rgba(255,200,50,.25);border-radius:1px}
#lbl-scatter{position:absolute;left:8px;top:2px;font-size:10px;color:rgba(255,220,80,.5);font-family:'Microsoft JhengHei',Arial,sans-serif}
#result-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500}
#result-bar{display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:#fff;border-radius:14px;padding:28px 36px;z-index:600;text-align:center;min-width:260px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#result-bar h2{font-size:22px;margin-bottom:8px;color:#1a5c30}
.score{font-size:36px;font-weight:bold;color:#1a8a3c;margin-bottom:8px}
.detail{font-size:14px;color:#555;margin-bottom:16px;line-height:1.5}
#result-bar button{background:#1a8a3c;color:#fff;padding:10px 28px;font-size:16px;border-radius:8px;cursor:pointer}
</style>
</head>

  {id:20,n:27,r:5,c:0,sx:4,sy:324,ax:400,ay:426},
  {id:21,n:38,r:5,c:1,sx:101,sy:324,ax:531,ay:426},
  {id:22,n:6,r:5,c:2,sx:198,sy:324,ax:662,ay:426},
  {id:23,n:15,r:5,c:3,sx:295,sy:324,ax:793,ay:426},
  {id:24,n:28,r:6,c:0,sx:4,sy:388,ax:400,ay:522},
  {id:25,n:39,r:6,c:1,sx:101,sy:388,ax:531,ay:522},
  {id:26,n:7,r:6,c:2,sx:198,sy:388,ax:662,ay:522},
  {id:27,n:16,r:6,c:3,sx:295,sy:388,ax:793,ay:522},
  {id:28,n:29,r:7,c:0,sx:4,sy:452,ax:400,ay:585},
  {id:29,n:40,r:7,c:1,sx:101,sy:452,ax:531,ay:585},
  {id:30,n:2,r:7,c:2,sx:198,sy:452,ax:662,ay:585},
  {id:31,n:17,r:7,c:3,sx:295,sy:452,ax:793,ay:585},
  {id:32,n:30,r:8,c:0,sx:4,sy:516,ax:400,ay:648},
  {id:33,n:41,r:8,c:1,sx:101,sy:516,ax:531,ay:648},
  {id:34,n:8,r:8,c:2,sx:198,sy:516,ax:662,ay:648},
  {id:35,n:18,r:8,c:3,sx:295,sy:516,ax:793,ay:648},
  {id:36,n:31,r:9,c:0,sx:4,sy:580,ax:400,ay:711},
  {id:37,n:42,r:9,c:1,sx:101,sy:580,ax:531,ay:711},
  {id:38,n:9,r:9,c:2,sx:198,sy:580,ax:662,ay:711},
  {id:39,n:19,r:9,c:3,sx:295,sy:580,ax:793,ay:711},
  {id:40,n:32,r:10,c:0,sx:4,sy:644,ax:400,ay:774},
  {id:41,n:43,r:10,c:1,sx:101,sy:644,ax:531,ay:774},
  {id:42,n:9,r:10,c:2,sx:198,sy:644,ax:662,ay:774},
  {id:43,n:20,r:10,c:3,sx:295,sy:644,ax:793,ay:774},
  {id:44,n:22,r:11,c:0,sx:4,sy:708,ax:400,ay:837},
  {id:45,n:44,r:11,c:1,sx:101,sy:708,ax:531,ay:837},
  {id:46,n:4,r:11,c:2,sx:198,sy:708,ax:662,ay:837},
  {id:47,n:21,r:11,c:3,sx:295,sy:708,ax:793,ay:837}
];
const CW=128,CH=60,BW=944,BH=937;
const GRID_X=400,SCATTER_W=388;
const SNAP=38;
const COL_LABELS=["地點","馬太福音相關路標","地圖字母","事件"];

// ─── 重複答案支援：imageNum → [{id, ax, ay}] ─────────────────────────────────
const imgSlots={};
PIECES.forEach(p=>{
  if(!imgSlots[p.n]) imgSlots[p.n]=[];
  imgSlots[p.n].push({id:p.id, ax:p.ax, ay:p.ay});
});
// occupied[slotId] = pieceId（防止兩片同時放在同一格）
const occupied={};

const st={};

function board(){return document.getElementById('board');}
function inner(){return document.getElementById('scale-inner');}

function init(){
  document.querySelectorAll('.piece,.drop-hint').forEach(e=>e.remove());
  PIECES.forEach(p=>{
    const h=document.createElement('div');
    h.className='drop-hint'; h.id='h'+p.id;
    h.style.cssText='left:'+p.ax+'px;top:'+p.ay+'px;width:'+CW+'px;height:'+CH+'px';
    const tag=document.createElement('div');
    tag.className='hint-tag'; tag.textContent=COL_LABELS[p.c];
    h.appendChild(tag);
    board().appendChild(h);
    const el=document.createElement('div');
    el.className='piece'; el.id='pc'+p.id;
    el.style.cssText='left:'+p.sx+'px;top:'+p.sy+'px;width:'+CW+'px;height:'+CH+'px';
    const img=document.createElement('img');
    img.src=IMGS[p.n]; img.draggable=false;
    el.appendChild(img);
    board().appendChild(el);
    st[p.id]={x:p.sx,y:p.sy,locked:false};
    drag(el,p);
  });
}

let dg=null;

function drag(el,p){
  function start(cx,cy){
    if(st[p.id].locked) return;
    const r=inner().getBoundingClientRect(), sc=r.width/BW;
    dg={p,el,ox:(cx-r.left)/sc,oy:(cy-r.top)/sc,sx:st[p.id].x,sy:st[p.id].y};
    el.classList.add('dragging'); el.style.zIndex=1000;
  }
  el.addEventListener('mousedown',e=>{e.preventDefault();start(e.clientX,e.clientY);});
  el.addEventListener('touchstart',e=>{e.preventDefault();start(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
}

document.addEventListener('mousemove',e=>{
  if(!dg) return;
  const r=inner().getBoundingClientRect(), sc=r.width/BW;
  move((e.clientX-r.left)/sc,(e.clientY-r.top)/sc);
});
document.addEventListener('touchmove',e=>{
  if(!dg) return; e.preventDefault();
  const r=inner().getBoundingClientRect(), sc=r.width/BW;
  move((e.touches[0].clientX-r.left)/sc,(e.touches[0].clientY-r.top)/sc);
},{passive:false});
document.addEventListener('mouseup',end);
document.addEventListener('touchend',end);

function move(mx,my){
  const nx=Math.max(-20,Math.min(BW-CW+20, dg.sx+(mx-dg.ox)));
  const ny=Math.max(-20,Math.min(BH-CH+20, dg.sy+(my-dg.oy)));
  st[dg.p.id].x=nx; st[dg.p.id].y=ny;
  dg.el.style.left=nx+'px'; dg.el.style.top=ny+'px';
}

function end(){
  if(!dg) return;
  const p=dg.p, el=dg.el;
  el.classList.remove('dragging'); el.style.zIndex=1;
  snapCheck(p,el); dg=null;
}

// ─── 重複答案核心：找最近的同圖格子（未被佔用）────────────────────────────────
function snapCheck(p,el){
  const slots=imgSlots[p.n];
  let best=null, bestDist=Infinity;
  for(const slot of slots){
    // 格子已被「其他」拼圖片佔用就跳過
    if(occupied[slot.id]!==undefined && occupied[slot.id]!==p.id) continue;
    const dx=st[p.id].x-slot.ax, dy=st[p.id].y-slot.ay;
    const dist=Math.abs(dx)+Math.abs(dy);
    if(dist<SNAP*2 && dist<bestDist){ bestDist=dist; best=slot; }
  }
  if(best) lockAt(p,el,best);
}

function lockAt(p,el,slot){
  // 釋放本片原本佔用的格子
  for(const sid in occupied){ if(occupied[sid]===p.id){ delete occupied[sid]; break; } }
  occupied[slot.id]=p.id;
  st[p.id].x=slot.ax; st[p.id].y=slot.ay; st[p.id].locked=true;
  el.style.left=slot.ax+'px'; el.style.top=slot.ay+'px'; el.style.zIndex=2;
  el.classList.add('locked');
  document.getElementById('h'+slot.id).classList.add('correct');
}

function shuffle(){
  PIECES.forEach(p=>{
    if(st[p.id].locked) return;
    const el=document.getElementById('pc'+p.id);
    const nx=Math.random()*(SCATTER_W-CW-6)+4;
    const ny=Math.random()*(BH-CH-6)+4;
    st[p.id].x=nx; st[p.id].y=ny;
    el.style.left=nx+'px'; el.style.top=ny+'px';
  });
}

function check(){
  let ok=0;
  PIECES.forEach(p=>{
    const el=document.getElementById('pc'+p.id);
    const slots=imgSlots[p.n];
    let snapped=false;
    for(const slot of slots){
      if(occupied[slot.id]!==undefined && occupied[slot.id]!==p.id) continue;
      const dx=st[p.id].x-slot.ax, dy=st[p.id].y-slot.ay;
      if(Math.abs(dx)<SNAP && Math.abs(dy)<SNAP){ lockAt(p,el,slot); snapped=true; break; }
    }
    if(st[p.id].locked) ok++;
  });
  const tot=PIECES.length, pct=Math.round(ok/tot*100);
  document.getElementById('res-title').textContent=ok===tot?'全部正確！':'答對 '+ok+'/'+tot;
  document.getElementById('res-score').textContent=pct+'%';
  document.getElementById('res-detail').textContent=ok===tot?'太棒了！配對完成！':'還有 '+(tot-ok)+' 片需要調整';
  document.getElementById('result-overlay').style.display='block';
  document.getElementById('result-bar').style.display='block';
}

function closeResult(){
  document.getElementById('result-overlay').style.display='none';
  document.getElementById('result-bar').style.display='none';
}

function reset(){
  // Clear all occupied state
  for(const k in occupied) delete occupied[k];
  document.querySelectorAll('.piece').forEach(e=>{
    e.classList.remove('locked');
    e.style.zIndex=1;
  });
  document.querySelectorAll('.drop-hint').forEach(e=>e.classList.remove('correct'));
  PIECES.forEach(p=>{
    const el=document.getElementById('pc'+p.id);
    st[p.id]={x:p.sx,y:p.sy,locked:false};
    el.style.left=p.sx+'px'; el.style.top=p.sy+'px';
  });
  shuffle();
}

function scaleBoard(){
  const cw=document.getElementById('scale-container').clientWidth;
  const sc=Math.min(1,cw/BW);
  inner().style.transform='scale('+sc+')';
  document.getElementById('scale-container').style.height=(BH*sc)+'px';
}
window.addEventListener('resize',scaleBoard);
scaleBoard();

document.getElementById('btn-shuffle').addEventListener('click',shuffle);
document.getElementById('btn-check').addEventListener('click',check);
document.getElementById('btn-reset').addEventListener('click',reset);

init();
shuffle();
</script>
