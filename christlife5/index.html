<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>基督生平分期</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Microsoft JhengHei',Arial,sans-serif;padding:10px;user-select:none;-webkit-user-select:none}
h1{color:#f0c060;font-size:clamp(14px,3vw,22px);margin-bottom:8px;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,.6)}
.btn-bar{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;justify-content:center}
button{padding:9px 22px;font-size:15px;font-family:'Microsoft JhengHei',Arial,sans-serif;border:none;border-radius:8px;cursor:pointer;font-weight:bold;transition:transform .1s,box-shadow .1s;box-shadow:0 3px 8px rgba(0,0,0,.4)}
button:active{transform:translateY(2px);box-shadow:0 1px 4px rgba(0,0,0,.3)}
#btn-shuffle{background:#e07b00;color:#fff}
#btn-check{background:#1a8a3c;color:#fff}
#btn-reset{background:#555;color:#eee}
#scale-container{width:100%;max-width:960px;position:relative}
#scale-inner{width:960px;height:540px;transform-origin:top left;position:relative}
#board{width:960px;height:540px;position:absolute;top:0;left:0;overflow:hidden}
#board-bg{position:absolute;inset:0;background-size:cover;background-position:center}
.drop-hint{
  position:absolute;
  border:2px dashed rgba(255,200,50,.7);
  background:rgba(255,220,80,.08);
  border-radius:4px;
  pointer-events:none;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background .2s;
}
.drop-hint .col-tag{
  font-size:18px;
  font-weight:bold;
  font-family:'Microsoft JhengHei',Arial,sans-serif;
  color:rgba(255,220,80,.75);
  letter-spacing:2px;
  text-shadow:0 1px 4px rgba(0,0,0,.6);
  pointer-events:none;
}
.drop-hint.correct{
  border-color:rgba(0,220,0,.8);
  background:rgba(0,220,0,.12);
}
.drop-hint.correct .col-tag{
  color:rgba(0,220,0,.6);
}
.piece{position:absolute;cursor:grab;border-radius:4px;box-shadow:2px 3px 8px rgba(0,0,0,.4);transition:box-shadow .1s;touch-action:none}
.piece:active,.piece.dragging{cursor:grabbing;box-shadow:4px 6px 16px rgba(0,0,0,.6);z-index:1000}
.piece.locked{cursor:default;box-shadow:0 0 0 3px rgba(0,220,0,.7),2px 3px 8px rgba(0,0,0,.4)}
.piece img{display:block;width:100%;height:100%;border-radius:4px;pointer-events:none}
.piece-check-icon{position:absolute;top:-12px;right:-12px;font-size:22px;line-height:1;pointer-events:none;z-index:10}
#result-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:500}
#result-bar{display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#fff;border-radius:14px;padding:28px 36px;z-index:600;text-align:center;min-width:260px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#result-bar h2{font-size:22px;margin-bottom:8px;color:#1a5c30}
#result-bar .score{font-size:36px;font-weight:bold;color:#1a8a3c;margin-bottom:8px}
#result-bar .detail{font-size:14px;color:#555;margin-bottom:16px;line-height:1.5}
#result-bar button{background:#1a8a3c;color:#fff;padding:10px 28px;font-size:16px;border-radius:8px}
</style>
</head>
<body>
<h1>基督生平分期 — 拼圖遊戲</h1>
<div class="btn-bar">
  <button id="btn-shuffle">洗牌</button>
  <button id="btn-check">對答案</button>
  <button id="btn-reset">重置</button>
</div>
<div id="scale-container">
  <div id="scale-inner">
    <div id="board">
      <div id="board-bg"></div>
    </div>
  </div>
</div>
<div id="result-overlay" onclick="closeResult()"></div>
<div id="result-bar">
  <h2 id="result-title"></h2>
  <div class="score" id="result-score"></div>
  <div class="detail" id="result-detail"></div>
  <button onclick="closeResult()">關閉</button>
</div>

const positions={},locked={};
let dragging=null,dragOffX=0,dragOffY=0;
function buildPieces(){
  const board=document.getElementById('board');
  PIECES.forEach(p=>{
    const h=document.createElement('div');
    h.className='drop-hint';h.id='hint-'+p.id;
    h.style.left=p.ansX+'px';h.style.top=p.ansY+'px';
    h.style.width=p.w+'px';h.style.height=p.h+'px';
    const tag=document.createElement('span');
    tag.className='col-tag';tag.textContent=p.colLabel;
    h.appendChild(tag);
    board.appendChild(h);
  });
  PIECES.forEach(p=>{
    const el=document.createElement('div');
    el.className='piece';el.id=p.id;
    el.style.width=p.w+'px';el.style.height=p.h+'px';el.style.zIndex=10;
    const img=document.createElement('img');
    img.src=p.src;img.alt=p.label;
    el.appendChild(img);
    el.addEventListener('mousedown',e=>startDrag(e,p.id));
    el.addEventListener('touchstart',e=>startDrag(e,p.id),{passive:false});
    board.appendChild(el);
    positions[p.id]={x:p.startX,y:p.startY};
    locked[p.id]=false;
  });
}
function placeDefault(shuffle){
  PIECES.forEach(p=>{
    locked[p.id]=false;
    document.getElementById(p.id).classList.remove('locked');
    positions[p.id]=shuffle?{x:Math.random()*(BOARD_W-p.w),y:Math.random()*(BOARD_H-p.h)}:{x:p.startX,y:p.startY};
    applyPosition(p.id);
  });
  clearCheckIcons();clearHints();
}
function applyPosition(id){
  const el=document.getElementById(id);
  el.style.left=positions[id].x+'px';el.style.top=positions[id].y+'px';
}
function applyScale(){
  const c=document.getElementById('scale-container');
  const scale=Math.min(c.clientWidth/960,1);
  document.getElementById('scale-inner').style.transform='scale('+scale+')';
  c.style.height=(540*scale)+'px';
}
window.addEventListener('resize',applyScale);
function getScale(){return Math.min(document.getElementById('scale-container').clientWidth/960,1)}
function toInner(cx,cy){
  const rect=document.getElementById('scale-inner').getBoundingClientRect();
  const s=getScale();
  return{x:(cx-rect.left)/s,y:(cy-rect.top)/s};
}
function evXY(e){return e.touches?{cx:e.touches[0].clientX,cy:e.touches[0].clientY}:{cx:e.clientX,cy:e.clientY}}
function startDrag(e,id){
  if(locked[id])return;
  e.preventDefault();dragging=id;
  document.getElementById(id).classList.add('dragging');
  const{cx,cy}=evXY(e);const pos=toInner(cx,cy);
  dragOffX=pos.x-positions[id].x;dragOffY=pos.y-positions[id].y;
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onEnd);
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd);
}
function onMove(e){
  if(!dragging)return;e.preventDefault();
  const{cx,cy}=evXY(e);const pos=toInner(cx,cy);
  const p=PIECES.find(p=>p.id===dragging);
  let x=Math.max(0,Math.min(BOARD_W-p.w,pos.x-dragOffX));
  let y=Math.max(0,Math.min(BOARD_H-p.h,pos.y-dragOffY));
  positions[dragging]={x,y};applyPosition(dragging);
}
function onEnd(){
  if(!dragging)return;
  document.getElementById(dragging).classList.remove('dragging');
  document.removeEventListener('mousemove',onMove);
  document.removeEventListener('mouseup',onEnd);
  document.removeEventListener('touchmove',onMove);
  document.removeEventListener('touchend',onEnd);
  dragging=null;
}
document.getElementById('btn-shuffle').addEventListener('click',()=>placeDefault(true));
document.getElementById('btn-reset').addEventListener('click',()=>{closeResult();placeDefault(false)});
document.getElementById('btn-check').addEventListener('click',checkAnswer);
function checkAnswer(){
  clearCheckIcons();
  let correct=0;const wrong=[];
  PIECES.forEach(p=>{
    const pos=positions[p.id];
    const cx=pos.x+p.w/2,cy=pos.y+p.h/2;
    const ax=p.ansX+p.w/2,ay=p.ansY+p.h/2;
    const ok=Math.sqrt((cx-ax)**2+(cy-ay)**2)<=TOLERANCE;
    const el=document.getElementById(p.id);
    const icon=document.createElement('div');
    icon.className='piece-check-icon';icon.textContent=ok?'✅':'❌';
    el.appendChild(icon);
    if(ok){
      correct++;locked[p.id]=true;
      el.classList.add('locked');
      positions[p.id]={x:p.ansX,y:p.ansY};applyPosition(p.id);
      const hint=document.getElementById('hint-'+p.id);
      if(hint)hint.classList.add('correct');
    }else{wrong.push(p.label)}
  });
  const total=PIECES.length;
  document.getElementById('result-score').textContent=correct+' / '+total;
  if(correct===total){
    document.getElementById('result-title').textContent='🎉 全部正確！太厲害了！';
    document.getElementById('result-detail').textContent='所有生平分期都配對正確！';
  }else{
    document.getElementById('result-title').textContent='再試一次！';
    document.getElementById('result-detail').textContent=
      correct===0?'還沒有正確的配對，繼續努力！':'錯誤：'+wrong.join('、');
  }
  document.getElementById('result-overlay').style.display='block';
  document.getElementById('result-bar').style.display='block';
}
function closeResult(){
  document.getElementById('result-bar').style.display='none';
  document.getElementById('result-overlay').style.display='none';
}
function clearCheckIcons(){document.querySelectorAll('.piece-check-icon').forEach(el=>el.remove())}
function clearHints(){document.querySelectorAll('.drop-hint').forEach(el=>el.classList.remove('correct'))}
